<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-box h2 { margin-bottom: 8px; font-size: 24px; }
        .login-box p { color: #666; margin-bottom: 24px; font-size: 14px; }
        .login-box input {
            width: 100%; padding: 12px 16px;
            border: 1px solid #e5e7eb; border-radius: 6px;
            font-size: 16px; margin-bottom: 16px; outline: none;
            font-family: inherit;
        }
        .login-box input:focus {
            border-color: #0369a1;
            box-shadow: 0 0 0 3px rgba(3,105,161,0.1);
        }
        .login-box button {
            width: 100%; padding: 12px;
            background: #0369a1; color: #fff; border: none;
            border-radius: 6px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }
        .login-box button:hover { background: #0358a1; }
        .login-error {
            color: #e53e3e; font-size: 14px;
            margin-top: 12px; display: none;
        }
        .back-link {
            display: inline-block; margin-top: 20px;
            color: #999; font-size: 13px;
        }
        .back-link:hover { color: #0369a1; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>관리자 로그인</h2>
        <p>문의 관리 페이지에 접속하려면 비밀번호를 입력하세요.</p>
        <input type="password" id="adminPassword" placeholder="비밀번호 입력" autofocus>
        <button onclick="adminLogin()">로그인</button>
        <p class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</p>
        <a href="index.html" class="back-link">← 홈으로 돌아가기</a>
    </div>

    <script>
        // ★ 관리자 비밀번호 (변경하세요)
        var ADMIN_PASSWORD = 'admin1234';

        // ★ Google Sheets URL (스프레드시트 URL로 교체하세요)
        var GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1FKpEWjJA3rOTQSBhYyokpekuN5dUUSU5InA4_8eIWsI/edit?gid=0#gid=0';

        function adminLogin() {
            var pw = document.getElementById('adminPassword').value;
            if (pw === ADMIN_PASSWORD) {
                window.open(GOOGLE_SHEET_URL, '_blank');
                document.getElementById('loginError').style.display = 'none';
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }

        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
</html>
